name: Build Windows

on:
  push:
    branches: [main]
    paths:
      - 'win/**'
      - '.github/workflows/build-windows.yml'
  pull_request:
    paths:
      - 'win/**'
  workflow_dispatch:

jobs:
  build:
    name: Build & Package (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: win
        run: dotnet restore

      - name: Build
        working-directory: win
        run: dotnet build -c Release --nologo

      - name: Test
        working-directory: win
        run: dotnet test -c Release --nologo --no-build

      - name: Publish (self-contained win-x64)
        working-directory: win
        run: |
          dotnet publish OneMenu.App/OneMenu.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --nologo `
            -o publish

      - name: Package zip
        run: |
          $version = (git describe --tags --always 2>$null) -replace '/', '-'
          if (-not $version) { $version = "dev" }
          $zipName = "oneMenu-windows-$version.zip"
          Compress-Archive -Path win\publish\* -DestinationPath $zipName
          Write-Host "Package: $zipName"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneMenu-windows
          path: oneMenu-windows-*.zip
          retention-days: 30
